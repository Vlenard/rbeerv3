<div id="home-container">
  @for (beer of beers(); track beer.id) {
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title>{{ beer.name }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p>{{ beer.note }}</p>
        <mat-chip-set aria-label="Fish selection">
          <mat-chip>{{ beer.alcohol }}</mat-chip>
          <mat-chip>{{ beer.type }}</mat-chip>
        </mat-chip-set>
      </mat-card-content>
      <mat-card-actions>
        <button matButton [routerLink]="['/app/beer', beer.id]">EDIT</button>
        <button matButton (click)="deleteBeer(beer.id)">DELETE</button>
      </mat-card-actions>
    </mat-card>
  }
</div>
